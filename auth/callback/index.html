<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Accesso in corso...</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #0f172a; color: white; font-family: sans-serif;
           display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .msg { text-align: center; }
    .spinner { width: 40px; height: 40px; border: 3px solid #334155;
               border-top-color: #6366f1; border-radius: 50%;
               animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="msg">
    <div class="spinner"></div>
    <p>Accesso in corso...</p>
  </div>
  <script>
    const SUPABASE_URL = 'https://zynytvhmlnvlvswuhtse.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_bhmy7olw7-7VxATfSW248g_siFu7lFO';
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { persistSession: true, storageKey: 'dt-auth-session', detectSessionInUrl: true }
    });

    async function handleCallback() {
      // Aspetta che Supabase elabori il token dall'URL
      const { data, error } = await sbClient.auth.getSession();
      if (data?.session) {
        window.location.href = '/';
      } else {
        // Riprova dopo un attimo (il token potrebbe essere ancora nell'hash)
        setTimeout(async () => {
          const { data: d2 } = await sbClient.auth.getSession();
          if (d2?.session) {
            window.location.href = '/';
          } else {
            document.querySelector('p').textContent = 'Errore di accesso. Riprova.';
            setTimeout(() => window.location.href = '/', 2000);
          }
        }, 1000);
      }
    }

    handleCallback();
  </script>
</body>
</html>
