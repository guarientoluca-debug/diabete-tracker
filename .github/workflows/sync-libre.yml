name: Sync Freestyle Libre

on:
  schedule:
    - cron: '0 */4 * * *'  # ogni 4 ore
  workflow_dispatch:         # esecuzione manuale

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync Libre data
        env:
          LIBRE_EMAIL: ${{ secrets.LIBRE_EMAIL }}
          LIBRE_PASSWORD: ${{ secrets.LIBRE_PASSWORD }}
        run: node sync-libre.js

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add libre-data.json
          git diff --staged --quiet || git commit -m "sync: aggiorna dati Libre $(date -u '+%Y-%m-%d %H:%M')"
          git push
